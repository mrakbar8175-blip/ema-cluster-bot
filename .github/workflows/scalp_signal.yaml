name: Scalp Signal (Manual) with Trade Log

on:
  workflow_dispatch:                # manual trigger only

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install requests pandas numpy yfinance
      - name: Run scalp bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scalp_bot.py
      - name: Commit and push CSV changes
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git add .
          git commit -m "Update scalp trade log" || echo "No changes to commit"
          git pull --rebase --autostash origin main
          git push