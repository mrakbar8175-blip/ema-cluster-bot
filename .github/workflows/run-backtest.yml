name: Swing Sentinel Backtest

on:
  workflow_dispatch:

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6 hours
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pandas numpy yfinance requests matplotlib mplfinance
      - name: Run Backtest
        run: python swing_sentinel.py --backtest
      - name: Upload backtest results
        uses: actions/upload-artifact@v4
        with:
          name: backtest-results
          path: |
            backtest_equity.csv
            backtest_trades.csv
            backtest_summary.txt