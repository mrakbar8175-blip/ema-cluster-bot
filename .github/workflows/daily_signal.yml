name: Daily EMA Cluster Signal

on:
  schedule:
    - cron: '30 0 * * *'          # 00:30 UTC every day (just after daily close)
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true   # allow pushing CSV changes
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install requests pandas numpy yfinance
      - name: Run EMA Cluster Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python ema_cluster_bot.py
      - name: Commit and push trade logs
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git add .
          git commit -m "Update trade logs" || echo "No changes to commit"
          git push
