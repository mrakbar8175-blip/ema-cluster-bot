name: Raw Indicator Extraction (Backtest)

on:
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pandas numpy requests

      - name: Restore KuCoin data cache
        uses: actions/cache@v4
        with:
          path: cache
          key: kucoin-cache-${{ hashFiles('backtest_ku.py') }}-v1
          restore-keys: kucoin-cache-

      - name: Create output directory
        run: mkdir -p kucoin_data

      - name: Run raw indicator extraction
        run: python backtest_ku.py FETCH

      - name: Upload raw dataset as artifact
        uses: actions/upload-artifact@v4
        with:
          name: raw-indicator-data
          path: raw_indicator_data_2y.csv
          retention-days: 90