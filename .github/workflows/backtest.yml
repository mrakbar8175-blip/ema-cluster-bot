name: Raw Indicator Extraction (Backtest)

on:
  workflow_dispatch:      # allows manual trigger from GitHub UI
  # schedule:
  #   - cron: '0 4 * * *'  # optional: run daily at 4 AM UTC

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6 hours max – adjust as needed

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pandas numpy yfinance requests

      - name: Restore Yahoo data cache
        uses: actions/cache@v4
        with:
          path: cache
          key: yahoo-cache-${{ hashFiles('backtest_ku.py') }}-v1
          restore-keys: yahoo-cache-

      - name: Create output directory
        run: mkdir -p kucoin_data

      - name: Run raw indicator extraction
        run: python backtest_ku.py FETCH   # "FETCH" is just a dummy argument

      - name: Upload raw dataset as artifact
        uses: actions/upload-artifact@v4
        with:
          name: raw-indicator-data
          path: raw_indicator_data_2y.csv
          retention-days: 90