name: Multi-Asset Swing Signal (Manual) with Trade Tracker

on:
  workflow_dispatch:                # manual trigger only

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install requests pandas numpy yfinance
      - name: Run multi‑asset bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python forex_ai.py
      - name: Commit and push CSV changes
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git add .
          git commit -m "Update multi-asset trade logs" || echo "No changes to commit"
          git pull --rebase --autostash origin main
          git push 