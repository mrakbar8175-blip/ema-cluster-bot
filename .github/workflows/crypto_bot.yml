name: Crypto Swing Bot (Manual)

on:
  workflow_dispatch:                # only manual trigger

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas numpy yfinance matplotlib mplfinance requests

      - name: Download previous state (if exists)
        uses: dawidd6/action-download-artifact@v2
        with:
          workflow: crypto_bot.yml      # must match the exact filename (without .yml path)
          name: bot-state
          path: .
          if_no_artifact_found: warn
        continue-on-error: true

      - name: Run bot
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python crypto_bot.py       # change if your script name is different

      - name: Upload updated state
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-state
          path: |
            crypto_portfolio.json
            crypto_trade_log.csv
            crypto_open_trades.csv
            crypto_trade_results.csv
            daily_start_balance.txt
            perf_counter.txt
          retention-days: 90